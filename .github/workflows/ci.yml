name: ci

on:
  push:
    branches: ["feat/example", "develop"]
  pull_request:
    branches: ["feat/example", "develop", "main"]

permissions:
  contents: read

jobs:
  awkit_cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Vet
        run: go vet ./...

      - name: Go test (awkit)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage threshold
        run: |
          total=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total coverage: ${total}%"
          if (( $(echo "$total < 60" | bc -l) )); then
            echo "::error::Coverage ${total}% is below 60% threshold"
            exit 1
          fi

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Go test
        working-directory: backend
        run: go test -race ./...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Frontend sanity
        working-directory: frontend
        shell: bash
        run: |
          set -euo pipefail
          test -d Assets
          test -f Packages/manifest.json
          python3 - <<'PY'
          import json, pathlib, sys
          p = pathlib.Path("Packages/manifest.json")
          try:
            json.loads(p.read_text(encoding="utf-8"))
          except Exception as e:
            print(f"invalid manifest.json: {e}")
            sys.exit(2)
          print("ok: Packages/manifest.json valid json")
          PY
